# Portable Codex settings reference.
# Do not use this file directly as the live config. Copy selected settings into
# ~/.config/codex/config.toml only after confirming the target machine should use them.

sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

[sandbox_workspace_write]
writable_roots = ["/tmp", "/private/tmp"]

[features]
plugin_hooks = true
hooks = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "five-hour-limit"]
status_line_use_colors = true

[plugins."context-mode@context-mode"]
enabled = true

# MCP servers: safe to share when they hold no secret. GitHub authenticates via
# OAuth — run `codex mcp login github` once per machine (creds stored encrypted,
# machine-local; no PAT in config or env). Keep work-only / inline-token / local-
# path servers in config.toml only.
[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
# auth: codex mcp login github

# Optional local hooks: keep repo or machine-specific commands out of shared config.
# Use ~/.config/codex/hooks.json to call ~/.config/codex/hooks/dispatch.sh,
# then let that dispatcher decide what applies on the current machine/repo.

# ── Profiles ─────────────────────────────────────────────────────────────────
# Select at launch: codex -p <name> "task"   (CLI flags override profile values;
# profiles override only the keys they set, the rest falls back to the config above.)

[profiles.strict]            # recon / untrusted code: look, don't touch
approval_policy = "on-request"
sandbox_mode = "read-only"
approvals_reviewer = "auto_review"

[profiles.plan]              # deeper reasoning, still sandboxed to the workspace
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
approvals_reviewer = "auto_review"

[profiles.auto]              # hands-off but contained: no prompts, sandbox stays on
approval_policy = "never"
sandbox_mode = "workspace-write"
# Full-access escape hatch (no sandbox) — uncomment only for trusted, supervised runs:
#   [profiles.yolo]
#   approval_policy = "never"
#   sandbox_mode = "danger-full-access"
