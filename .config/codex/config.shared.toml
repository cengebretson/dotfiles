# Portable Codex settings reference.
# Do not use this file directly as the live config. Copy selected settings into
# ~/.config/codex/config.toml only after confirming the target machine should use them.

sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

[sandbox_workspace_write]
writable_roots = ["/tmp", "/private/tmp"]

[features]
plugin_hooks = true
hooks = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "five-hour-limit"]
status_line_use_colors = true

[plugins."context-mode@context-mode"]
enabled = true

# Optional local hooks: keep repo or machine-specific commands out of shared config.
# Use ~/.config/codex/hooks.json to call ~/.config/codex/hooks/dispatch.sh,
# then let that dispatcher decide what applies on the current machine/repo.
