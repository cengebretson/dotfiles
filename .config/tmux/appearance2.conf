# Configure Cpu
set -g @cpu_percentage_format "%03d%%"
set -g @cpu_low_fg_color "#{E:#{@thm_green}}"
set -g @cpu_medium_fg_color "#{E:#{@thm_yellow}}"
set -g @cpu_high_fg_color "#{E:#{@thm_red}}"
set -g @cpu_medium_thresh "80"
set -g @cpu_high_thresh "90"

# Configure Mem
set -g @ram_percentage_format "%03d%%"
set -g @ram_low_fg_color "#{E:#{@thm_green}}"
set -g @ram_medium_fg_color "#{E:#{@thm_yellow}}"
set -g @ram_high_fg_color "#{E:#{@thm_red}}"
set -g @ram_medium_thresh "80"
set -g @ram_high_thresh "90"
 
# Configure battery
set -g @batt_icon_charge_tier8 '󰂂'
set -g @batt_icon_charge_tier7 '󰂁'
set -g @batt_icon_charge_tier6 '󰂀'
set -g @batt_icon_charge_tier5 '󰁿'
set -g @batt_icon_charge_tier4 '󰁾'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier1 '󰁺'
set -g @batt_icon_status_charged '󰁹'
set -g @batt_icon_status_charging '󰂄'
set -g @batt_icon_status_discharging '󰂃'
set -g @batt_icon_status_attached '󰂄'
set -g @batt_icon_status_unknown '󰂄'

set -g @batt_color_charge_primary_tier8 "#{E:#{@thm_mauve}}"
set -g @batt_color_charge_primary_tier7 "#{E:#{@thm_mauve}}"
set -g @batt_color_charge_primary_tier6 "#{E:#{@thm_mauve}}"
set -g @batt_color_charge_primary_tier5 "#{E:#{@thm_mauve}}"
set -g @batt_color_charge_primary_tier4 "#{E:#{@thm_mauve}}"
set -g @batt_color_charge_primary_tier3 "#{E:#{@thm_pink}}"
set -g @batt_color_charge_primary_tier2 "#{E:#{@thm_yellow}}"
set -g @batt_color_charge_primary_tier1 "#{E:#{@thm_red}}"

set -g @batt_color_status_primary_charged "#{E:#{@thm_mauve}}"
set -g @batt_color_status_primary_charging "#{E:#{@thm_mauve}}"
set -g @batt_color_status_primary_discharging "#{E:#{@thm_red}}"
set -g @batt_color_status_primary_attached "#{E:#{@thm_mauve}}"
set -g @batt_color_status_primary_unknown  "#{E:#{@thm_mauve}}"
set -g @batt_percentage_format "%03d%%"

# Configure Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none" # none == default
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Style
set -g @custom_status_separator "#[fg=#{@thm_surface_2},bg=default,none]"
set -g @custom_status_inline "󰇝"
set -g @custom_text "#[fg=#{@thm_subtext_0}]"

# status left look and feel
set -g status-left-length 80
set -g status-left ""

# status left modules
# Session name (#S) is dropped on narrow clients (the phone), since Moshi's
# session picker already shows it; the prefix icon stays. Gate is per-client.
set -ga status-left "#{?client_prefix,#[bg=#a6e3a1 fg=#1e1e2e bold] 󰐱 #{?#{e|>=:#{client_width},100},#S ,}#[default],#[fg=#a6e3a1] 󰐱 #{?#{e|>=:#{client_width},100},#S ,}}#[fg=#{@thm_overlay_1} nobold]│ "

# status right look and feel
set -g status-right-length 160
set -g status-right ""

# status right modules
# Heavy modules (path, CPU, RAM, Moshi) render only on clients >= 100 cols wide,
# so a narrow client (e.g. the phone over Moshi) keeps the row for the window list.
# Width is per-client via #{e|>=:#{client_width},100} (e| forces numeric compare).

set -ga status-right "#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow}] 󰆏 COPY ,}"
set -ga status-right "#{?#{e|>=:#{client_width},100},#[fg=#{@thm_blue}]#{E:#{@custom_status_inline}} 󰉋 #{E:#{@custom_text}}#{b:pane_current_path} ,}"
set -ga status-right "#{?#{e|>=:#{client_width},100},#{E:#{@custom_status_separator}}#[fg=#{cpu_fg_color}]#{E:#{@custom_status_inline}} 󰍛 #{E:#{@custom_text}}#{cpu_percentage} ,}"
set -ga status-right "#{?#{e|>=:#{client_width},100},#[fg=#{ram_fg_color}]#{E:#{@custom_status_inline}} 󰘚 #{E:#{@custom_text}}#{ram_percentage} ,}"
# Moshi agent-hook daemon indicator (dim=off, amber=unpaired, green=paired)
set -ga status-right "#{?#{e|>=:#{client_width},100},#{E:#{@custom_status_separator}}#[fg=#{@thm_overlay_1}]#{E:#{@custom_status_inline}} #(~/.config/tmux/scripts/moshi_status.sh) #[default],}"
# set -ga status-right "#{battery_color_fg}#[bg=default]#{E:#{@custom_status_inline}} #{battery_icon} #{E:#{@custom_text}}#{battery_percentage} "

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_mantle}"
set -g status-justify "left"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "fg=#{@thm_peach},bg=default"
setw -g pane-border-style "fg=#{@thm_overlay_2},bg=default"
setw -g pane-border-lines single

# command line look and feel
set -g message-style "bg=#{@thm_bg}, fg=#{@thm_fg}"
set -g message-command-style "bg=#{@thm_mantle}, fg=#{@thm_fg}"

# window status (managed by catppuccin)
set -gF window-status-separator "#[fg=#{@thm_overlay_1}] 󰇝 "
set -g @catppuccin_window_status_style "custom"
set -gu @catppuccin_window_flags
set -g @catppuccin_window_number ""
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_number_color "default"
set -g @catppuccin_window_text_color "default"
# Window name (#W) is dropped on narrow clients (the phone); only the number glyph
# shows, so multiple tabs fit. Gate is per-client via #{e|>=:#{client_width},100}.
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=default]#{E:@tmux_attention_status}#(~/.config/tmux/scripts/custom_number.sh '#I' 'dsquare')#{?#{e|>=:#{client_width},100},#{?#{!=:#{window_name},},#W,},}#{?window_bell_flag, #[fg=#{@thm_red}]󰂞,}#{?window_zoomed_flag, #[fg=#{@thm_yellow}]󰁌,}"
set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_text "#[fg=#{@thm_mantle},bg=#{@thm_peach}]#{E:@tmux_attention_status}#(~/.config/tmux/scripts/custom_number.sh '#I' 'msquare')#{?#{e|>=:#{client_width},100},#{?#{!=:#{window_name},},#W,},}#{?window_zoomed_flag, 󰁌,}"
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_peach},bg=default]▐"
set -g @catppuccin_window_current_right_separator "#[fg=#{@thm_peach},bg=default]▌"

# set -g status-justify absolute-centre

