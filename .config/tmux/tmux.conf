####
#### graphics passthrough ####
####

# Allow Kitty graphics protocol (and other terminal escape sequences) to pass
# through tmux to the outer terminal — required for chafa pixel rendering.
set -g allow-passthrough on

####
#### rebindings ####
####

# for quick reload of config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; run '~/.config/tmux/plugins/tmux/catppuccin.tmux' \; refresh-client -S \; display-message "  config reloaded"

# Set prefix to Ctrl-Space
unbind C-b
set -g prefix C-Space

# new window with name prompt
bind c display-popup -E -w 40% -h 3 -T " Create New Window " -S "fg=#fab387" "bash -c 'read -p \"  Window name: \" name && [ -n \"\$name\" ] && tmux new-window -n \"\$name\" -c \"#{pane_current_path}\"'"

# open splits in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# cycle windows
bind -n M-l next-window
bind -n M-h previous-window

# force a redraw of the focused pane (fixes desynced TUI input, e.g. Claude in tmux)
# sends the app its own clear-screen (C-l) directly, bypassing the vim-tmux-navigator
# C-l binding — a proper clear+repaint, not a dirty SIGWINCH repaint that stacks frames
bind -n M-r send-keys C-l \; display-message "↻ clear sent"

####
#### options ###
####

set -g popup-border-lines heavy

set -g status-interval 15
set -g escape-time 0
set -g repeat-time 350
set -g display-time 1500
set -g history-limit 50000

# set focus events on for nvim
set -g focus-events on

# options for color ####
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:Tc:Ms=\\E]52;%p1%s;%p2%s\\007"
# Pass OSC 8 hyperlinks through to the outer terminal (Ghostty supports them).
# Without this tmux strips them, so clickable links never reach the terminal.
set -ag terminal-features "*:hyperlinks"
# Synchronized output (mode 2026): flicker-free full-screen redraws (Neovim, scrolling).
set -ag terminal-features "*:sync"
# Styled underlines: curly/undercurl + colored underlines (Neovim/LSP diagnostics).
set -ag terminal-features "*:usstyle"

# options for indexes for window/session creation ###
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

# When a second client (e.g. Moshi on the phone) attaches, size each window to
# the smallest client *viewing that window*, not the smallest client on the
# session. Keeps the laptop full-size unless both devices view the same window.
setw -g aggressive-resize on

# Single source of truth for "is this client the phone?". A client strictly
# narrower than this is treated as the phone everywhere: it gets the collapsed
# status bar (appearance2.conf) AND is bounced onto a grouped phone-* mirror
# (phone_autoview.sh). Keep these in lockstep via this one option so there is no
# width band that gets phone chrome but still clobbers the laptop's view.
set -g @phone_max_cols 80

####
#### improved copy mode ####
####

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send-keys -X cancel
set -g copy-mode-match-style "bg=#313244,fg=#cba6f7"
set -g copy-mode-current-match-style "bg=#cba6f7,fg=#1e1e2e"
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

#####
##### Display Popups ##### 
#####

# lazygit
bind y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"

# new session
bind S display-popup -E -w 40% -h 3 -T " Create New Session " -S "fg=#fab387" "bash -c 'read -p \"  Session name: \" name && [ -n \"\$name\" ] && tmux new-session -d -s \"\$name\" -c \"#{pane_current_path}\" && tmux switch-client -t \"\$name\"'"


#####
##### Display Menu ##### 
#####


#####
##### Bootstrap Plugins ##### 
#####

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'cengebretson/tmux-which-key'   ## C + k
set -g @plugin 'cengebretson/tmux-fzf-jump'
set -g @plugin 'cengebretson/tmux-attention'

# tmux-attention: clear attention markers 4s after viewing (default 8)
set -g @tmux_attention_clear_delay "4"

####
#### Configure Themes ####
####

# Toggle between appearance.conf and appearance2.conf
bind T run-shell "~/.config/tmux/scripts/toggle_theme.sh" \; source-file ~/.config/tmux/tmux.conf \;

# load theme file which is a symlink
source-file ~/.config/tmux/appearance.conf

# Seed @moshi_paired (read by moshi_status.sh in the status bar). moshi-hook
# status touches Keychain so it can be slow; run backgrounded so it never blocks
# tmux startup. Re-runs on every reload, which also refreshes the pairing state.
run-shell -b "moshi-hook status 2>/dev/null | grep -qE '^status:[[:space:]]+paired' && tmux set -g @moshi_paired yes || tmux set -g @moshi_paired no"

# prefix N: toggle Moshi notifications (daemon off/on). Backgrounded because
# `brew services stop` can be slow; the 󰄛 status indicator flips when it lands.
# moshi-notify is a fish function, so it is invoked via a login fish for PATH.
bind N display-message "Moshi: toggling notifications..." \; run-shell -b "fish -l -c 'moshi-notify toggle'"

# Click the 󰄛 indicator in the status bar to toggle the daemon (same as prefix N).
# The indicator is wrapped in `range=user|moshi` (appearance1/2.conf), which fires
# the Status mouse key with mouse_status_range=moshi. Anything else on the status
# line keeps the default select-window behaviour.
bind -n MouseDown1Status {
    if -F "#{==:#{mouse_status_range},moshi}" {
        display-message "Moshi: toggling notifications..."
        run-shell -b "fish -l -c 'moshi-notify toggle'"
    } {
        select-window -t=
    }
}

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Override plugin defaults that can't be set before plugin init
set -g window-status-bell-style "none"

# fzf-jump without prefix (C-j == Enter/LF — keep this only if that's intentional)
bind -n M-j run-shell "~/.config/tmux/plugins/tmux-fzf-jump/select_pane.sh 'true' '100' 'center,70%,80%' 'right,,,nowrap' '󰐱' '󰖲' '󰆍' '▪  ' '/' '166;227;161' '249;226;175'"

# Tap the status-left (session / prefix area) to open the fzf-jump picker instead
# of the default `choose-tree -Zs`. Phone-friendly one-tap jump, and unlike
# choose-tree it honors @fzf_pane_switch_exclude-sessions (hides phone-* mirrors).
# Args mirror the M-j bind above.
bind -n MouseDown1StatusLeft run-shell "~/.config/tmux/plugins/tmux-fzf-jump/select_pane.sh 'true' '100' 'center,70%,80%' 'right,,,nowrap' '󰐱' '󰖲' '󰆍' '▪  ' '/' '166;227;161' '249;226;175'"

# Hide the ephemeral grouped "phone-*" mirror sessions (created below) from the
# fzf-jump picker. The plugin's exclude filter is generic; this sets the policy.
set -g @fzf_pane_switch_exclude-sessions "phone-*"

# Phone auto-view: when a narrow (phone) client attaches OR switches to a real
# session (e.g. picking one from fzf-jump), transparently move it onto a grouped
# "phone-<session>" mirror so it shares the windows but keeps its own size, never
# reshaping the laptop's view; reap the mirror when the phone detaches. Detection
# keys on full-terminal width (portable across machines) in phone_autoview.sh.
# client-session-changed is what catches picker jumps (switch-client), so the
# phone can never sit directly on a real session. The guard stops `prefix r`
# reloads from stacking duplicate hooks, since set-hook -ga appends each run; it
# also preserves the existing tmux-attention hooks instead of replacing them.
if -F '#{!=:#{@phone_autoview_installed},1}' {
    set-hook -ga client-attached 'run-shell -b "~/.config/tmux/scripts/phone_autoview.sh #{client_name} #{client_width} #{client_session}"'
    set-hook -ga client-session-changed 'run-shell -b "~/.config/tmux/scripts/phone_autoview.sh #{client_name} #{client_width} #{client_session}"'
    set-hook -ga client-detached 'run-shell -b "~/.config/tmux/scripts/phone_autoview_cleanup.sh"'
    set -g @phone_autoview_installed 1
}
