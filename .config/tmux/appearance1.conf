set -g @catppuccin_flavor "frappe"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=default,fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
# Remote-connection indicator: 󰚥 + host, only when attached over SSH
# (@conn_type maintained by scripts/conn_type.sh via client hooks in tmux.conf).
# Mirrors appearance2 so the feature survives a theme toggle.
set -ga status-right "#{?#{==:#{@conn_type},remote},#[bg=default,fg=#{@thm_peach}] 󰚥 #h #[bg=default,fg=#{@thm_overlay_0}, none]│,}"
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=default,fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=default]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
# Moshi agent-hook daemon indicator — provided by the tmux-moshi plugin. The
# #{E:@moshi_status} format carries its own range=user wrapper, so left-click,
# right-click menu, and prefix N all work without inline bindings here.
set -ga status-right "#[bg=default] #{E:@moshi_status} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{E:@tmux_attention_context}}} "
set -ga status-right "#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow}] 󰆏 COPY ,}"

# Configure Tmux
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# command line and status-message look and feel
# This file is sourced once before Catppuccin initializes, so only force-expand
# its palette after the theme variables exist. It is sourced again after TPM.
if -F '#{!=:#{@thm_surface_1},}' {
    set -gF message-style "bg=#{@thm_surface_1}, fg=#{@thm_fg}, bold"
    set -gF message-command-style "bg=#{@thm_surface_1}, fg=#{@thm_fg}, bold"
}
set -g message-format "#[#{?#{command_prompt},#{E:message-command-style},#{E:message-style}},fill=#45475a]#{message}"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window style
set -wg automatic-rename on
set -g automatic-rename-format ''
set -g window-status-separator "#[bg=default,fg=#{@thm_overlay_0},none]│#[default]"
set -g status-justify 'absolute-centre'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_flags_icon_format "#{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},}#{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},}#{?window_silence_flag,#{E:@catppuccin_window_flags_icon_silent},}#{?window_active,#{E:@catppuccin_window_flags_icon_current},}#{?window_last_flag,#{E:@catppuccin_window_flags_icon_last},}#{?window_marked_flag,#{E:@catppuccin_window_flags_icon_mark},}#{?window_zoomed_flag,#{E:@catppuccin_window_flags_icon_zoom},}"
set -g @catppuccin_window_number ""
set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_text_color "default"
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=default]#{E:@tmux_attention_status}#(~/.config/tmux/scripts/custom_number.sh '#I' 'dsquare')#{?#{!=:#{window_name},},#W,}#{?window_bell_flag, #[fg=#{@thm_red}]󰂞,}"
set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_text "#[fg=#{@thm_mantle},bg=#{@thm_peach}]#{E:@tmux_attention_status}#(~/.config/tmux/scripts/custom_number.sh '#I' 'msquare')#{?#{!=:#{window_name},},#W,}"
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_peach},bg=#{@thm_bg}]▐"
set -g @catppuccin_window_current_right_separator "#[fg=#{@thm_peach},bg=#{@thm_bg}]▌"
