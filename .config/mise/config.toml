[settings]
# Keep agent and sandboxed commands from trying network installs/resolution during probes.
not_found_auto_install = false
prefer_offline = true
fetch_remote_versions_cache = "1w"

[tools]
node = "24.15.0"
bun = "1.3.13"
python = "3.14.5"
uv = "0.11.13"
go = "1.26.3"
rust = "1.95.0"
lua = "5.5.0"
stylua = "2.5.2"
prettier = "3.8.4"
claude = "2.1.191"
